name: FieldRise AI秘書 - デイリーブリーフィング

on:
  schedule:
    # 毎朝 7:00 JST（= 22:00 UTC 前日）に実行
    - cron: '0 22 * * *'
  workflow_dispatch: {}  # 手動実行も可能

permissions:
  contents: write

concurrency:
  group: daily-briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 天気情報を収集（まんのう町）
        run: python3 automation/scripts/collect_weather.py
        continue-on-error: true

      - name: AIニュースを収集
        run: python3 automation/scripts/collect_ai_news.py
        continue-on-error: true

      - name: Cafeブランドデータを収集
        run: python3 automation/scripts/collect_cafe_data.py
        continue-on-error: true

      - name: Cafeブランドレポートを生成
        run: python3 automation/scripts/generate_cafe_report.py
        continue-on-error: true

      - name: 日報を生成
        run: python3 automation/scripts/generate_briefing.py

      - name: 結果をコミット
        run: |
          git config user.name "FieldRise-AI-Secretary"
          git config user.email "ai-secretary@fieldrise.local"
          git add projects/project-001-ai-secretary/ data/
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "AI秘書: デイリーブリーフィング $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
          fi

      - name: LINEへ日報を通知
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: python3 automation/scripts/send_line_notification.py
        continue-on-error: true
